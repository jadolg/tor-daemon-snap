name: tor-daemon
title: Tor Daemon
base: core26
version: '0.4.9.11'
summary: Tor binary running as a daemon
description: |
  The Tor binary running as a daemon.
  Default configuration can be found at /var/snap/tor-daemon/current/usr/local/etc/tor/torrc
license: BSD-3-Clause
contact: diazorozcoj@gmail.com
issues: https://github.com/jadolg/tor-daemon-snap/issues
source-code: https://github.com/jadolg/tor-daemon-snap
website: https://www.torproject.org
grade: stable
confinement: strict

platforms:
  amd64:
  arm64:
  armhf:
  riscv64:
  s390x:
  ppc64el:

apps:
  tor:
    command: usr/local/bin/tor
    daemon: simple
    plugs:
      - network
      - network-bind

parts:
  tor:
    source: .
    plugin: autotools
    build-packages:
      - libssl-dev
      - libevent-dev
      - zlib1g-dev
      - curl
      - gnupg
      - make
    stage-packages:
      - libevent-2.1-7t64
    override-pull: |
      set -eu
      EXPECTED_SHA256=2e6c1720118c812acf0079fd47cf91b6bfaba5d766c321c4d3d2a28d6a11a8ed
      KEYS="B74417EDDF22AC9F9E90F49142E86A2A11F48D36 514102454D0A87DB0767A1EBBE6A0531C18A9179"
      VERSION="${CRAFT_PROJECT_VERSION:-${SNAPCRAFT_PROJECT_VERSION:-}}"
      [ -n "$VERSION" ] || { echo "ERROR: project version not set" >&2; exit 1; }

      make -C "${CRAFT_PROJECT_DIR:-$SNAPCRAFT_PROJECT_DIR}" fetch-source \
        VERSION="$VERSION" \
        EXPECTED_SHA256="$EXPECTED_SHA256" \
        KEYS="$KEYS" \
        DEST="$CRAFT_PART_SRC"

layout:
  /usr/local/etc/tor:
    bind: $SNAP_DATA/usr/local/etc/tor
  /var/lib/tor:
    bind: $SNAP_DATA/var/lib/tor
